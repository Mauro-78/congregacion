  :root {

    --accent: #3b5998;
    --accent-bg: #eef1f8;
    --accent-text: #1e3a7a;
    --radius: 12px;

  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f2f2f7;
      --text2: #aeaeb2;
      --text3: #636366;
      --border: rgba(255,255,255,0.1);

      --accent: #6d8fe8;

      --accent-text: #a8bff0;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 0 40px;
  }
  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .week-nav button {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
    font-weight: 500;
  }
  .week-nav button:active { opacity: 0.7; }
  .week-label {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }
  .btn-hoy {
    background: var(--accent-bg) !important;
    color: var(--accent-text) !important;
    border-color: transparent !important;
    font-size: 13px !important;
  }
  main { padding: 16px 16px 0; }
  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .card {
    background: var(--bg2);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 8px;
  }
  .card-header {
    padding: 12px 14px 8px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-day {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }
  .card-date {
    font-size: 12px;
    color: var(--text3);
  }
  .card-body { padding: 4px 0; }
  .row {
    display: flex;
    align-items: baseline;
    padding: 8px 14px;
    gap: 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .row:last-child { border-bottom: none; }
  .row-label {
    font-size: 12px;
    color: var(--text2);
    min-width: 110px;
    flex-shrink: 0;
  }
  .row-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }
  .row-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }
  .pres-badge {
    display: inline-block;
    background: var(--accent-bg);
    color: var(--accent-text);
    font-size: 12px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .titulo-disc {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    padding: 12px 14px 6px;
    line-height: 1.4;
  }
  .parte-row {
    padding: 8px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .parte-row:last-child { border-bottom: none; }
  .parte-rol {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 2px;
  }
  .parte-quien {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .sala-tag {
    display: inline-block;
    background: var(--bg3);
    color: var(--text2);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    margin: 8px 14px 4px;
  }
  .no-data {
    text-align: center;
    color: var(--text3);
    font-size: 14px;
    padding: 24px 0;
    font-style: italic;
  }
  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .grid2 .row { border-right: 0.5px solid var(--border); }
  .grid2 .row:nth-child(even) { border-right: none; }
  @media (max-width: 400px) {
    .row-label { min-width: 90px; font-size: 11px; }
    .row-value { font-size: 13px; }
  }
</style>

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function toISO(d) {
  return d.toISOString().slice(0,10);
}

function formatWeekShort(mon) {
  const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${mon.getDate()} ${months[mon.getMonth()]} — ${sun.getDate()} ${months[sun.getMonth()]} ${sun.getFullYear()}`;
}

let currentMonday = getMondayOf(new Date());

function goToday() {
  currentMonday = getMondayOf(new Date());
  render();
}

function changeWeek(dir) {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + dir * 7);
  render();
}

    html += `<div class="card"><div class="no-data">Sin datos para esta semana</div></div>`;
  }
  html += `</div>`;

  // TURNOS
  html += `<div class="section"><div class="section-title">Turnos de servicio</div>`;
  if (trs.length) {
    trs.forEach(t => {
      html += `<div class="card">
        <div class="card-header">
          <span class="card-day">${t.dia}</span>
          <span class="card-date">${t.fecha.split('-').reverse().join('/')}</span>
        </div>
        <div class="card-body">
          ${t.lector ? `<div class="row"><div class="row-label">Lector</div><div class="row-value">${t.lector}</div></div>` : ''}
          <div class="row"><div class="row-label">Sonido</div><div class="row-value">${t.sonido}</div></div>
          <div class="row"><div class="row-label">Plataforma</div><div class="row-value">${t.plat}</div></div>
          <div class="row"><div class="row-label">Micrófonos</div><div class="row-value">${t.mic}</div></div>
          <div class="row"><div class="row-label">Ac. auditorio</div><div class="row-value">${t.acAud || '—'}</div></div>
          ${t.acEnt ? `<div class="row"><div class="row-label">Ac. entrada</div><div class="row-value">${t.acEnt}</div></div>` : ''}
          ${t.pres ? `<div class="row"><div class="row-label">Presidente</div><div class="row-value"><span class="pres-badge">${t.pres}</span></div></div>` : ''}
          <div class="row"><div class="row-label">Revistas</div><div class="row-value">${t.rev}</div></div>
          <div class="row"><div class="row-label">Publicaciones</div><div class="row-value">${t.pub}</div></div>
        </div>
      </div>`;
    });
  } else {
    html += `<div class="card"><div class="no-data">Sin datos de turnos para esta semana</div></div>`;
  }
  html += `</div>`;

  // VIDA Y MINISTERIO
  html += `<div class="section"><div class="section-title">Reunión vida y ministerio</div>`;
  if (reunion) {
    html += `<div class="card">
      ${reunion.salaAux ? `<span class="sala-tag">Sala auxiliar: ${reunion.salaAux}</span>` : ''}
      <div class="card-body">`;
    reunion.partes.forEach(p => {
      html += `<div class="parte-row">
        <div class="parte-rol">${p.rol}</div>
        ${p.quien ? `<div class="parte-quien">${p.quien}</div>` : ''}
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="card"><div class="no-data">Sin datos de reunión para esta semana</div></div>`;
  }
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
}

render();
</script>
</body>
</html>
