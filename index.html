<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Congregación">
<meta name="theme-color" content="#4a6fa5">
<title>Programa Semanal — Congregación</title>
<style>
:root {
  --bg: #f0f4fb;
  --bg-card: #ffffff;
  --bg-header: #4a6fa5;
  --bg-sec1: #eef3fc;
  --bg-sec2: #edf7f0;
  --bg-sec3: #fdf4e7;
  --accent1: #4a6fa5;
  --accent2: #2e8a57;
  --accent3: #c07a1a;
  --text: #1a1a1e;
  --text2: #4a4a52;
  --text3: #888896;
  --border: rgba(0,0,0,0.09);
  --border-sec1: rgba(74,111,165,0.25);
  --border-sec2: rgba(46,138,87,0.25);
  --border-sec3: rgba(192,122,26,0.25);
  --radius: 14px;
  --radius-sm: 9px;
  --week-bg: #4a6fa5;
  --week-text: #ffffff;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111318;
    --bg-card: #1e2130;
    --bg-header: #1a2540;
    --bg-sec1: #162038;
    --bg-sec2: #0f2419;
    --bg-sec3: #271c08;
    --accent1: #7a9fd4;
    --accent2: #5ab882;
    --accent3: #e09a40;
    --text: #e8eaf2;
    --text2: #a0a4b8;
    --text3: #5a5e72;
    --border: rgba(255,255,255,0.08);
    --border-sec1: rgba(122,159,212,0.2);
    --border-sec2: rgba(90,184,130,0.2);
    --border-sec3: rgba(224,154,64,0.2);
    --week-bg: #1a2e5a;
    --week-text: #c8d8f0;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  max-width: 680px;
  margin: 0 auto;
  padding-bottom: 48px;
}

/* HEADER */
header {
  background: var(--bg-header);
  padding: 16px 18px 14px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header-top h1 {
  font-size: 17px;
  font-weight: 600;
  color: #ffffff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-top h1 img {
  width: 28px; height: 28px;
  border-radius: 5px;
}
.btn-actualizar {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 500;
  color: #ffffff;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-actualizar:hover { background: rgba(255,255,255,0.25); }
.btn-actualizar:active { opacity: 0.7; }
.btn-actualizar.loading { opacity: 0.6; pointer-events: none; }
.spin { display: inline-block; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SEMANA */
.week-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}
.week-nav button {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: var(--radius-sm);
  width: 36px; height: 36px;
  font-size: 18px;
  cursor: pointer;
  color: #ffffff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.week-nav button:active { opacity: 0.6; }
.week-pill {
  flex: 1;
  background: var(--week-bg);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  text-align: center;
  padding: 7px 12px;
}
.week-pill .week-dates {
  font-size: 15px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.01em;
}
.week-pill .week-year {
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  margin-top: 1px;
}
.btn-hoy {
  background: rgba(255,255,255,0.9) !important;
  color: var(--accent1) !important;
  font-size: 12px !important;
  font-weight: 600 !important;
  width: auto !important;
  padding: 0 10px !important;
  border-color: transparent !important;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1a1a2e;
  color: #fff;
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 20px;
  z-index: 100;
  transition: transform 0.3s ease;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* MAIN */
main { padding: 16px 14px 0; }

/* SECCIÓN */
.section { margin-bottom: 20px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  padding: 0 2px;
}
.section-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.sec1 .section-icon { background: var(--accent1); }
.sec2 .section-icon { background: var(--accent2); }
.sec3 .section-icon { background: var(--accent3); }
.section-title-text {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.01em;
}
.sec1 .section-title-text { color: var(--accent1); }
.sec2 .section-title-text { color: var(--accent2); }
.sec3 .section-title-text { color: var(--accent3); }
.section-line {
  flex: 1;
  height: 1.5px;
  border-radius: 2px;
}
.sec1 .section-line { background: var(--border-sec1); }
.sec2 .section-line { background: var(--border-sec2); }
.sec3 .section-line { background: var(--border-sec3); }

/* CARDS */
.card {
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.sec1 .card { background: var(--bg-sec1); border-color: var(--border-sec1); }
.sec2 .card { background: var(--bg-sec2); border-color: var(--border-sec2); }
.sec3 .card { background: var(--bg-sec3); border-color: var(--border-sec3); }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.sec1 .card-header { border-color: var(--border-sec1); }
.sec2 .card-header { border-color: var(--border-sec2); }
.sec3 .card-header { border-color: var(--border-sec3); }

.card-day {
  font-size: 13px;
  font-weight: 700;
}
.sec1 .card-day { color: var(--accent1); }
.sec2 .card-day { color: var(--accent2); }
.sec3 .card-day { color: var(--accent3); }

.card-date { font-size: 12px; color: var(--text3); }

.titulo-disc {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  padding: 12px 14px 8px;
  line-height: 1.4;
}

.row {
  display: flex;
  align-items: baseline;
  padding: 8px 14px;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.sec1 .row { border-color: var(--border-sec1); }
.sec2 .row { border-color: var(--border-sec2); }
.sec3 .row { border-color: var(--border-sec3); }
.row:last-child { border-bottom: none; }
.row-label {
  font-size: 12px;
  color: var(--text3);
  min-width: 115px;
  flex-shrink: 0;
}
.row-value {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}
.pres-badge {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.03em;
}
.sec1 .pres-badge { background: var(--bg-header); color: #fff; }
.sec2 .pres-badge { background: var(--accent2); color: #fff; }

.parte-row {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}
.sec3 .parte-row { border-color: var(--border-sec3); }
.parte-row:last-child { border-bottom: none; }
.parte-rol { font-size: 12px; color: var(--text3); margin-bottom: 2px; }
.parte-quien { font-size: 14px; font-weight: 500; color: var(--text); }

.sala-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  margin: 10px 14px 4px;
  background: rgba(192,122,26,0.15);
  color: var(--accent3);
}

.no-data {
  text-align: center;
  color: var(--text3);
  font-size: 14px;
  padding: 22px 0;
  font-style: italic;
}

.update-info {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  padding: 6px 0 0;
}
</style>
</head>

async function actualizarDesdeDrive() {
  const btn = document.getElementById('btn-act');
  const icon = document.getElementById('act-icon');
  btn.classList.add('loading');
  icon.innerHTML = '<span class="spin">↻</span>';
  showToast('Consultando planillas...');

  const urls = [
    `https://docs.google.com/spreadsheets/d/${SHEET_IDS.discursos}/export?format=csv&gid=1106218078`,
    `https://docs.google.com/spreadsheets/d/${SHEET_IDS.turnos}/export?format=csv&gid=0`,
    `https://docs.google.com/spreadsheets/d/${SHEET_IDS.reunion}/export?format=csv&gid=854931328`,
  ];

  try {
    const [csv1, csv2, csv3] = await Promise.all(urls.map(u =>
      fetch(u).then(r => { if(!r.ok) throw new Error('No se pudo acceder'); return r.text(); })
    ));
    parsearDiscursos(csv1);
    parsearTurnos(csv2);
    parsearReunion(csv3);
    const ahora = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('update-info').textContent = `Última actualización: ${ahora}`;
    showToast('✓ Planillas actualizadas');
    render();
  } catch(e) {

  }

  btn.classList.remove('loading');
  icon.innerHTML = '↻';
}

function parsearCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  return lines.map(line => {
    const cells = []; let cur = ''; let inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cells.push(cur.trim());
    return cells;
  });
}

function limpiar(str) {
  return (str||'').replace(/\t/g,' ').replace(/\s+/g,' ').trim();
}

function parseDate(str) {
  if (!str) return null;
  const s = limpiar(str);
  const m = s.match(/(\d{1,2})\s*[\/\-]\s*(\d{1,2})\s*[\/\-]\s*(\d{2,4})/);
  if (m) {
    const y = m[3].length === 2 ? '20' + m[3] : m[3];
    return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  return null;
}

function parsearDiscursos(csv) {
  const rows = parsearCSV(csv);
  const nuevos = [];
  for (const row of rows) {
    const rawFecha = limpiar(row[0]||'');
    const fecha = parseDate(rawFecha);
    if (!fecha) continue;
    const titulo = limpiar(row[1]||'');
    const conf   = limpiar(row[2]||'');
    const salen  = limpiar(row[3]||'');
    nuevos.push({d:fecha, titulo, conf, salen});
  }
  if (nuevos.length > 0) discursos = nuevos;
}

function parsearTurnos(csv) {
  const rows = parsearCSV(csv);
  const nuevos = [];
  for (const row of rows) {
    if (row.length < 5) continue;
    const rawFecha = limpiar(row[0]||'');
    if (!rawFecha.match(/\d/)) continue;
    const fecha = parseDate(rawFecha);
    if (!fecha) continue;
    const diaRaw = rawFecha.toLowerCase();
    const dia = (diaRaw.includes('s\u00e1b') || diaRaw.includes('sab')) ? 'S\u00e1bado' : 'Mi\u00e9rcoles';
    nuevos.push({
      fecha, dia,
      lector: limpiar(row[1]||''),
      sonido: [limpiar(row[2]||''), limpiar(row[3]||'')].filter(Boolean).join(' / '),
      plat:   limpiar(row[4]||''),
      mic:    [limpiar(row[5]||''), limpiar(row[6]||'')].filter(Boolean).join(' / '),
      acAud:  limpiar(row[7]||''),
      acEnt:  limpiar(row[8]||''),
      pres:   limpiar(row[9]||''),
      rev:    limpiar(row[10]||''),
      pub:    limpiar(row[11]||''),
    });
  }
  if (nuevos.length > 0) turnos = nuevos;
}

function parsearReunion(csv) {
  const rows = parsearCSV(csv);
  const meses = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,
                 julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  const map = {};
  let currentKey = null;
  let salaAuxGlobal = '';

  for (const row of rows) {
    const col0 = limpiar(row[0]||'');
    const col1 = limpiar(row[1]||'');
    const col2 = limpiar(row[2]||'');
    const col3 = limpiar(row[3]||'');

    // Sala auxiliar global (antes de la primera semana)
    if (col0.toLowerCase().startsWith('sala auxiliar')) {
      salaAuxGlobal = col1 || col0.replace(/sala auxiliar\s*:\s*/i,'').trim();
      continue;
    }

    // Nueva semana detectada por col3 o col0 que empieza con "Semana del"
    const semanaStr = col3.toLowerCase().includes('semana del') ? col3 : (col0.toLowerCase().includes('semana del') ? col0 : '');
    if (semanaStr) {
      const m = semanaStr.match(/semana del\s+(\d+)[^\d]+(\w+)[^\d]+(\d{4})/i);
      if (m) {
        const mes = meses[m[2].toLowerCase()];
        if (mes) {
          const fechaStr = `${m[3]}-${String(mes).padStart(2,'0')}-${m[1].padStart(2,'0')}T12:00:00`;
          currentKey = toISO(getMondayOf(new Date(fechaStr)));
          if (!map[currentKey]) map[currentKey] = {semana: currentKey, salaAux: salaAuxGlobal, partes:[]};
        }
      }
      if (col0.toLowerCase().includes('semana')) continue;
    }

    if (!currentKey) continue;
    if (!col0) continue;
    if (col0 === 'Reuni\u00f3n Vida y Ministerio Cristianos') continue;
    if (col0 === 'Semana_ID') continue;
    if (col0.toLowerCase().includes('tesoros de la b')) continue;
    if (col0.toLowerCase().includes('seamos mejores')) continue;
    if (col0.toLowerCase().includes('nuestra vida cristiana')) continue;
    if (col0.toLowerCase().startsWith('sala auxiliar')) { map[currentKey].salaAux = col1 || col0.replace(/sala auxiliar\s*:\s*/i,'').trim(); continue; }
    if (col1.toLowerCase() === 'sala principal') continue;

    let quien = col1;
    if (col2 && col2.toLowerCase() !== 'sala auxiliar') {
      quien = col1 ? `${col1} \u00b7 ${col2}` : col2;
    }
    if (!quien) continue;
    map[currentKey].partes.push({rol: col0, quien});
  }

  const nuevas = Object.values(map).filter(r => r.partes.length > 0);
  if (nuevas.length > 0) reuniones = nuevas;
}

// ---- NAVEGACIÓN ----
function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function toISO(d) { return d.toISOString().slice(0,10); }

const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MONTHSFULL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let currentMonday = getMondayOf(new Date());
function goToday() { currentMonday = getMondayOf(new Date()); render(); }
function changeWeek(dir) {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + dir * 7);
  render();
}

// ---- TOAST ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
